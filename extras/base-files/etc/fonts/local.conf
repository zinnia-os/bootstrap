<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Zinnia system font defaults.  Liberation (metric-compatible clones of
       Arial/Times/Courier) is preferred for the generic families, with DejaVu
       as the fallback so coverage never drops to nothing. -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Liberation Serif</family>
      <family>DejaVu Serif</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Liberation Mono</family>
      <family>DejaVu Sans Mono</family>
    </prefer>
  </alias>

  <!-- Map the common web/Windows family names that pages request onto the
       generic families above, so sites laid out for them get sensible
       metric-compatible substitutes instead of arbitrary DejaVu fallback. -->
  <match target="pattern"><test name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Verdana</string></test>
    <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Tahoma</string></test>
    <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="same"><string>serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Times</string></test>
    <edit name="family" mode="assign" binding="same"><string>serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Georgia</string></test>
    <edit name="family" mode="assign" binding="same"><string>serif</string></edit></match>
  <match target="pattern"><test name="family"><string>Courier New</string></test>
    <edit name="family" mode="assign" binding="same"><string>monospace</string></edit></match>
  <match target="pattern"><test name="family"><string>Courier</string></test>
    <edit name="family" mode="assign" binding="same"><string>monospace</string></edit></match>
</fontconfig>
