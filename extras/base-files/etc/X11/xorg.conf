# Xorg configuration for Zinnia.
#
# Zinnia exposes its DRM/KMS device at /dev/drm/card0 (not the usual
# /dev/dri/card0), and xorg-server is built without udev, so the GPU and input
# devices cannot be auto-probed.  Everything is therefore declared explicitly:
# the built-in "modesetting" driver is pointed at the KMS node, and input is
# handled by the evdev driver with static device paths (adjust to match
# /dev/input/ on your machine).

Section "ServerLayout"
    Identifier  "Layout0"
    Screen      0 "Screen0"
    InputDevice "Keyboard0" "CoreKeyboard"
    InputDevice "Mouse0"    "CorePointer"
EndSection

Section "ServerFlags"
    Option "AutoAddDevices" "false"
    Option "DontVTSwitch"   "true"
EndSection

Section "Module"
    Load "modesetting"
    Load "evdev"
EndSection

Section "Device"
    Identifier "Card0"
    Driver     "modesetting"
    Option     "kmsdev" "/dev/drm/card0"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Card0"
EndSection

Section "InputDevice"
    Identifier "Keyboard0"
    Driver     "evdev"
    Option     "Device"    "/dev/input/event0"
    Option     "XkbLayout" "de"
    Option     "XkbModel"  "pc105"
EndSection

Section "InputDevice"
    Identifier "Mouse0"
    Driver     "evdev"
    Option     "Device"    "/dev/input/event1"
EndSection
