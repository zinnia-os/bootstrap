	protocol: limine
	path: boot():/zinnia
	module_path: boot():/initramfs.tar
	cmdline: rd.init=/usr/bin/bash

/Debugging
	kaslr: no
	protocol: limine
	path: boot():/zinnia
	module_path: boot():/initramfs.tar
	cmdline: rd.init=/usr/bin/bash
